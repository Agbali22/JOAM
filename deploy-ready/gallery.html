      <section class="gallery-flow" aria-label="Camera roll gallery">
        <figure class="gallery-card mosaic-large" data-caption="dusk portrait" data-location="Tallahassee">
          <img src="./assets/gallery/featured-photo-1.jpg" alt="Joshua at dusk wearing a white shirt" />
          <figcaption><span>dusk portrait</span><small>Tallahassee</small></figcaption>
        </figure>

        <figure class="gallery-card mosaic-tall" data-caption="track season" data-location="meet day">
          <img src="./assets/gallery/featured-photo-3.jpg" alt="Joshua running on a blue track" />
          <figcaption><span>track season</span><small>meet day</small></figcaption>
        </figure>

        <figure class="gallery-card mosaic-portrait formal-frame" data-caption="formal evening" data-location="brick courtyard">
          <img src="./assets/gallery/featured-photo-2.jpg" alt="Joshua in a suit near brick walls" />
          <figcaption><span>formal evening</span><small>brick courtyard</small></figcaption>
        </figure>

        <figure class="gallery-card mosaic-wide" data-caption="street profile" data-location="California">
          <img src="./assets/gallery/featured-photo-4.jpg" alt="Joshua walking in a street with mountains behind him" />
          <figcaption><span>street profile</span><small>California</small></figcaption>
        </figure>

        <figure class="gallery-card mosaic-portrait la-frame" data-caption="yellow panther" data-location="Los Angeles">
          <img src="./assets/gallery/featured-photo-5.jpg" alt="Joshua standing near a bright yellow panther sculpture outside AMIRI" />
          <figcaption><span>yellow panther</span><small>Los Angeles</small></figcaption>
        </figure>

        <figure class="gallery-card mosaic-tall" data-caption="camera day" data-location="outside"><img src="./assets/gallery/gallery-1.jpg" alt="Joshua holding a camera outdoors" /><figcaption><span>camera day</span><small>outside</small></figcaption></figure>
        <figure class="gallery-card mosaic-portrait close-frame" data-caption="close portrait" data-location="dusk"><img src="./assets/gallery/gallery-2.jpg" alt="Close portrait of Joshua at dusk" /><figcaption><span>close portrait</span><small>dusk</small></figcaption></figure>
        <figure class="gallery-card mosaic-portrait family-frame" data-caption="family frame" data-location="evening"><img src="./assets/gallery/gallery-3.jpg" alt="Joshua standing with his mother at sunset" /><figcaption><span>family frame</span><small>evening</small></figcaption></figure>
        <figure class="gallery-card mosaic-wide" data-caption="friends" data-location="night sky"><img src="./assets/gallery/gallery-4.jpg" alt="Joshua standing with a friend at night" /><figcaption><span>friends</span><small>night sky</small></figcaption></figure>
